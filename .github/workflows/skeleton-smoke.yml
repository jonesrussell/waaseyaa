name: Skeleton Smoke (Packaged-form CI)

# Resolves Criterion B of #1315: composer-install the published alpha from
# Packagist into a minimal skeleton app and run a smoke suite on migrations
# plus one entity save/read round-trip. Catches the alpha.148 -> alpha.151
# class of failure where source-tree co-resolution masks consumer-install
# state.
#
# Triggers automatically after sync-skeleton.yml succeeds (which itself
# fires on v* tags). Retries composer create-project to absorb Packagist
# crawl lag. Alert-only — does not gate the release tag.

on:
  workflow_run:
    workflows: ['Sync Application Skeleton']
    types: [completed]
  workflow_dispatch:
    inputs:
      framework_constraint:
        description: 'composer constraint for waaseyaa/framework (empty = use skeleton default)'
        required: false
        default: ''

jobs:
  smoke:
    # workflow_run fires on every completion; only proceed when upstream succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout framework (smoke script only)
        uses: actions/checkout@v6
        with:
          path: framework

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, json, mbstring
          coverage: none
          tools: composer:v2

      - name: composer create-project waaseyaa/waaseyaa (with Packagist crawl retry)
        run: |
          # Packagist may not have crawled the just-tagged release yet.
          # Retry up to 8 times with 60s gaps (8 minutes total).
          attempt=1
          max_attempts=8
          until composer create-project waaseyaa/waaseyaa smoke-app \
              --stability=alpha --no-interaction --prefer-dist; do
            if [[ $attempt -ge $max_attempts ]]; then
              echo "create-project failed after ${max_attempts} attempts" >&2
              exit 1
            fi
            echo "create-project attempt ${attempt} failed; sleeping 60s and retrying"
            rm -rf smoke-app
            attempt=$((attempt + 1))
            sleep 60
          done

      - name: Override framework constraint (if requested)
        if: ${{ inputs.framework_constraint != '' }}
        working-directory: smoke-app
        run: |
          composer require "waaseyaa/framework:${{ inputs.framework_constraint }}" \
            --no-interaction --no-scripts --update-with-all-dependencies

      - name: Run migrations
        working-directory: smoke-app
        env:
          APP_ENV: local
        run: ./vendor/bin/waaseyaa migrate --no-interaction

      - name: Entity round-trip smoke
        working-directory: smoke-app
        env:
          APP_ENV: local
        run: php "$GITHUB_WORKSPACE/framework/tools/skeleton-smoke/smoke.php" "$PWD"
