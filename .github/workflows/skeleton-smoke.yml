name: Skeleton Smoke (Packaged-form CI)

# Resolves Criterion B of #1315: composer-install the published alpha from
# Packagist into a minimal skeleton app and run a smoke suite on migrations
# plus one entity save/read round-trip. Catches the alpha.148 -> alpha.151
# class of failure where source-tree co-resolution masks consumer-install
# state.
#
# Always pins the framework to the EXACT tag that triggered the run (or the
# version supplied via workflow_dispatch). The retry loop on the pin step
# absorbs Packagist crawl latency — composer require fails loudly when the
# version isn't yet listed, unlike create-project which would silently
# install whatever the previous "latest" was.
#
# Alert-only — does not gate the release tag.

on:
  workflow_run:
    workflows: ['Sync Application Skeleton']
    types: [completed]
  workflow_dispatch:
    inputs:
      framework_constraint:
        description: 'composer constraint for waaseyaa/framework (e.g. 0.1.0-alpha.168). Required.'
        required: true

jobs:
  smoke:
    # workflow_run fires on every completion; only proceed when upstream
    # succeeded AND its head_branch is a release tag we can pin to.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Resolve target framework version
        id: target
        env:
          DISPATCH_INPUT: ${{ inputs.framework_constraint }}
          UPSTREAM_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [[ "$DISPATCH_INPUT" != "" ]]; then
            constraint="$DISPATCH_INPUT"
            source="workflow_dispatch input"
          else
            # Tag like "v0.1.0-alpha.168" -> exact composer constraint "0.1.0-alpha.168"
            constraint="${UPSTREAM_TAG#v}"
            source="upstream sync-skeleton tag"
          fi
          if [[ -z "$constraint" ]]; then
            echo "no framework constraint resolved" >&2
            exit 1
          fi
          echo "Using constraint: $constraint (from $source)"
          echo "constraint=$constraint" >> "$GITHUB_OUTPUT"

      - name: Checkout framework (smoke script only)
        uses: actions/checkout@v6
        with:
          path: framework

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: pdo_sqlite, json, mbstring
          coverage: none
          tools: composer:v2

      - name: composer create-project waaseyaa/waaseyaa
        run: |
          composer create-project waaseyaa/waaseyaa smoke-app \
            --stability=alpha --no-interaction --prefer-dist

      - name: Wait for Packagist to index framework + siblings
        env:
          CONSTRAINT: ${{ steps.target.outputs.constraint }}
        run: |
          # composer require fails opaquely when ANY sibling waaseyaa/*
          # package hasn't been indexed yet — the resolver lists tens of
          # found versions but says "does not match the constraint", masking
          # WHICH dep is the culprit. Poll the Packagist p2 endpoint for
          # each first-party sibling (admin-surface has been the canary)
          # so the smoke run has a clean go/no-go signal before invoking
          # composer. Budget: 30 attempts × 60s = 30 minutes — wider than
          # the previous 12-minute composer-retry loop because split
          # packages can lag the framework's own crawl during release
          # windows. p2 is a CDN GET; polling 7 packages is cheap.
          set -euo pipefail
          tag="v${CONSTRAINT}"
          # Discover all waaseyaa/* packages from the checked-out monorepo
          # (matches packagist-update.yml's discover step so the two stay in lockstep).
          pkgs=$(
            for f in framework/packages/*/composer.json; do
              jq -r '.name // empty' "$f"
            done
            jq -r '.name // empty' framework/composer.json
          )
          # Smoke-canary subset: framework + the packages most likely to lag
          # (admin-surface historically; others can be added if they trip the gate).
          canaries="waaseyaa/framework waaseyaa/admin-surface"
          for pkg in $canaries; do
            attempt=1
            max_attempts=30
            while true; do
              body=$(curl -sS --max-time 15 "https://repo.packagist.org/p2/${pkg}.json" || echo '{}')
              if echo "$body" | jq -e --arg pkg "$pkg" --arg tag "$tag" \
                '.packages[$pkg][]? | select(.version == $tag)' >/dev/null 2>&1; then
                echo "::notice::${pkg} ${tag} visible on Packagist (attempt ${attempt})"
                break
              fi
              if [[ $attempt -ge $max_attempts ]]; then
                echo "::error::${pkg} ${tag} not visible on Packagist after $((max_attempts * 60))s"
                echo "Latest indexed versions for ${pkg}:"
                echo "$body" | jq -r --arg pkg "$pkg" '.packages[$pkg][0:5][]? | "  - \(.version) (\(.time))"' || true
                exit 1
              fi
              echo "attempt ${attempt}/${max_attempts}: ${pkg} ${tag} not yet indexed; sleeping 60s"
              attempt=$((attempt + 1))
              sleep 60
            done
          done

      - name: Pin framework to ${{ steps.target.outputs.constraint }}
        working-directory: smoke-app
        env:
          CONSTRAINT: ${{ steps.target.outputs.constraint }}
        run: |
          # Packagist availability already verified in the previous step,
          # so this should succeed on the first attempt. Keep a small retry
          # for transient network blips only (3 attempts × 30s = 90s).
          attempt=1
          max_attempts=3
          until composer require "waaseyaa/framework:${CONSTRAINT}" \
              --no-interaction --no-scripts --update-with-all-dependencies; do
            if [[ $attempt -ge $max_attempts ]]; then
              echo "::error::composer require failed after ${max_attempts} attempts (network blip or unexpected resolver state)"
              exit 1
            fi
            echo "transient failure on attempt ${attempt}; sleeping 30s"
            attempt=$((attempt + 1))
            sleep 30
          done

      - name: Verify pinned version
        working-directory: smoke-app
        env:
          CONSTRAINT: ${{ steps.target.outputs.constraint }}
        run: |
          installed=$(composer show waaseyaa/framework | grep '^versions' | awk '{print $4}')
          # `composer show` returns the version with the `v` prefix; CONSTRAINT
          # has already had it stripped. Normalize both sides before comparing.
          installed_normalized="${installed#v}"
          expected_normalized="${CONSTRAINT#v}"
          echo "Installed: ${installed} (expected ${CONSTRAINT})"
          [[ "$installed_normalized" == "$expected_normalized" ]] || { echo "version mismatch" >&2; exit 1; }

      - name: Run migrations
        working-directory: smoke-app
        env:
          APP_ENV: local
        run: |
          # migrate is non-interactive by design; redirect stdin from
          # /dev/null so any future prompt EOF-falls-back to default.
          # Avoids --no-interaction which wasn't a global option in alpha.187.
          ./vendor/bin/waaseyaa migrate </dev/null

      - name: Entity round-trip smoke
        working-directory: smoke-app
        env:
          APP_ENV: local
        run: php "$GITHUB_WORKSPACE/framework/tools/skeleton-smoke/smoke.php" "$PWD"

      - name: HTTP entry-point smoke
        working-directory: smoke-app
        env:
          APP_ENV: local
        run: |
          # Catches the class of bug where skeleton's public/index.php has
          # wrong relative paths (issue #1439) — `waaseyaa serve` spawns
          # php -S which doesn't fail at startup, only at first request.
          ./vendor/bin/waaseyaa serve --host=127.0.0.1 --port=8088 &
          PHP_PID=$!
          trap "kill $PHP_PID 2>/dev/null || true" EXIT
          # Wait for listener (up to 20s).
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null --max-time 2 http://127.0.0.1:8088/healthz; then
              break
            fi
            # 4xx is acceptable (route may not exist); we only reject 5xx and connection failure.
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 2 http://127.0.0.1:8088/healthz || echo "000")
            if [[ "$code" =~ ^[1-4][0-9][0-9]$ ]]; then
              echo "Server responded with HTTP $code (acceptable — non-5xx)"
              break
            fi
            sleep 1
          done
          # Final assertion: backend must respond with non-5xx, non-zero status.
          code=$(curl -s -o /tmp/smoke-body.txt -w '%{http_code}' --max-time 5 http://127.0.0.1:8088/)
          echo "GET / -> HTTP $code"
          if [[ "$code" == "000" ]] || [[ "$code" =~ ^5[0-9][0-9]$ ]]; then
            echo "::error::HTTP entry-point smoke failed (status=$code)"
            echo "--- response body ---"
            head -50 /tmp/smoke-body.txt || true
            exit 1
          fi
