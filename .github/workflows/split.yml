name: Split Monorepo

on:
  push:
    tags:
      - 'v*'

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          # Layer 0: Foundation
          - { local: 'packages/foundation', remote: 'waaseyaa-foundation' }
          - { local: 'packages/cache', remote: 'waaseyaa-cache' }
          - { local: 'packages/plugin', remote: 'waaseyaa-plugin' }
          - { local: 'packages/typed-data', remote: 'waaseyaa-typed-data' }
          - { local: 'packages/database-legacy', remote: 'waaseyaa-database-legacy' }
          - { local: 'packages/testing', remote: 'waaseyaa-testing' }
          - { local: 'packages/i18n', remote: 'waaseyaa-i18n' }
          - { local: 'packages/queue', remote: 'waaseyaa-queue' }
          - { local: 'packages/state', remote: 'waaseyaa-state' }
          - { local: 'packages/validation', remote: 'waaseyaa-validation' }
          # Layer 1: Core Data
          - { local: 'packages/entity', remote: 'waaseyaa-entity' }
          - { local: 'packages/entity-storage', remote: 'waaseyaa-entity-storage' }
          - { local: 'packages/access', remote: 'waaseyaa-access' }
          - { local: 'packages/user', remote: 'waaseyaa-user' }
          - { local: 'packages/config', remote: 'waaseyaa-config' }
          - { local: 'packages/field', remote: 'waaseyaa-field' }
          # Layer 2: Content Types
          - { local: 'packages/node', remote: 'waaseyaa-node' }
          - { local: 'packages/taxonomy', remote: 'waaseyaa-taxonomy' }
          - { local: 'packages/media', remote: 'waaseyaa-media' }
          - { local: 'packages/path', remote: 'waaseyaa-path' }
          - { local: 'packages/menu', remote: 'waaseyaa-menu' }
          # Layer 3: Services
          - { local: 'packages/workflows', remote: 'waaseyaa-workflows' }
          # Layer 4: API
          - { local: 'packages/api', remote: 'waaseyaa-api' }
          - { local: 'packages/routing', remote: 'waaseyaa-routing' }
          # Layer 5: AI
          - { local: 'packages/ai-schema', remote: 'waaseyaa-ai-schema' }
          - { local: 'packages/ai-agent', remote: 'waaseyaa-ai-agent' }
          - { local: 'packages/ai-pipeline', remote: 'waaseyaa-ai-pipeline' }
          - { local: 'packages/ai-vector', remote: 'waaseyaa-ai-vector' }
          # Layer 6: Interfaces
          - { local: 'packages/cli', remote: 'waaseyaa-cli' }
          - { local: 'packages/admin', remote: 'waaseyaa-admin' }
          - { local: 'packages/mcp', remote: 'waaseyaa-mcp' }
          - { local: 'packages/ssr', remote: 'waaseyaa-ssr' }
          - { local: 'packages/telescope', remote: 'waaseyaa-telescope' }
          # Meta-packages
          - { local: 'packages/cms', remote: 'waaseyaa-cms' }
          - { local: 'packages/core', remote: 'waaseyaa-core' }
          - { local: 'packages/full', remote: 'waaseyaa-full' }
          - { local: 'packages/graphql', remote: 'waaseyaa-graphql' }
          # Project skeleton
          - { local: 'skeleton', remote: 'waaseyaa-project' }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install splitsh-lite
        run: |
          curl -sL https://github.com/splitsh/lite/releases/latest/download/lite_linux_amd64.tar.gz | tar xz
          sudo mv splitsh-lite /usr/local/bin/splitsh-lite

      - name: Guard against unauthorized v1.0 tag
        if: startsWith(github.ref_name, 'v1.0')
        run: |
          if [ ! -f "release-approvals/v1.0.approved" ]; then
            echo "::error::UNAUTHORIZED_V1_TAG: Monorepo split aborted."
            echo "::error::A v1.0 tag was pushed without owner approval. See VERSIONING.md."
            exit 1
          fi
          echo "v1.0 approval artifact verified. Proceeding with split."

      - name: Split and push
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_TOKEN }}
          LOCAL_PREFIX: ${{ matrix.package.local }}
          REMOTE_REPO: ${{ matrix.package.remote }}
          REPO_OWNER: ${{ github.repository_owner }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          REMOTE_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO_OWNER}/${REMOTE_REPO}.git"
          SHA=$(splitsh-lite --prefix="${LOCAL_PREFIX}")
          git remote add split "${REMOTE_URL}" 2>/dev/null || true
          git push split "${SHA}:refs/heads/main" --force
          git push split "${SHA}:refs/tags/${TAG_NAME}" --force
